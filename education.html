<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>การศึกษา</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f0f4f8;
}

.container{
    max-width:800px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0077cc;
}

.timeline{
    border-left:4px solid #0077cc;
    padding-left:20px;
    margin-top:30px;
}

.item{
    margin-bottom:25px;
}

.year{
    color:#0077cc;
    font-weight:bold;
    font-size:18px;
}

.school{
    font-size:20px;
    color:#333;
    margin:5px 0;
}

.detail{
    color:#666;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#0077cc;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
}

.btn:hover{
    background:#005fa3;
}
</style>

</head>
<body>

<div class="container">
    <h1>🎓 ประวัติการศึกษา</h1>

    <div class="timeline">

        <div class="item">
            <div class="year">2568 - ปัจจุบัน</div>
            <div class="school">มหาวิทยาลัยตัวอย่าง</div>
            <div class="detail">
                คณะวิทยาศาสตร์ สาขาวิทยาการคอมพิวเตอร์
            </div>
        </div>

        <div class="item">
            <div class="year">2565 - 2567</div>
            <div class="school">โรงเรียนตัวอย่าง</div>
            <div class="detail">
                ระดับมัธยมศึกษาตอนปลาย
            </div>
        </div>

        <div class="item">
            <div class="year">2562 - 2564</div>
            <div class="school">โรงเรียนตัวอย่าง</div>
            <div class="detail">
                ระดับมัธยมศึกษาตอนต้น
            </div>
        </div>

    </div>

    <a href="index.html" class="btn">🏠 กลับหน้าหลัก</a>
</div>

</body>
</html>
